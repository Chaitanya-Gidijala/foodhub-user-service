server.port=${SERVER_PORT:80}
# Render Postgres provides PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD.
# Build a JDBC URL explicitly so we don't depend on postgres:// style URLs.
spring.datasource.url=jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:postgres}}?sslmode=require
spring.datasource.username=${PGUSER:${DB_USERNAME:postgres}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
eureka.client.service-url.defaultZone=${EUREKA_URL}
